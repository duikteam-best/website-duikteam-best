<form action="https://api.web3forms.com/submit" method="POST" class="membership-form" id="membership-form">
  <input type="hidden" name="access_key" value="eb443c1e-a1ed-4603-99a3-ba97d3a3d32a">
  <input type="hidden" name="redirect" value="false">
  <input type="hidden" name="subject" value="Nieuw lidmaatschapsaanvraag – Duikteam Best">

  <!-- Persoonsgegevens -->
  <p class="section-heading">Persoonsgegevens</p>

  <div class="form-row">
    <div class="form-group">
      <label for="voornaam">Voornaam</label>
      <input type="text" id="voornaam" name="voornaam" placeholder="Jan" required>
    </div>
    <div class="form-group">
      <label for="achternaam">Achternaam</label>
      <input type="text" id="achternaam" name="achternaam" placeholder="de Vries" required>
    </div>
  </div>

  <div class="form-row">
    <div class="form-group">
      <label for="geslacht">Geslacht</label>
      <select id="geslacht" name="geslacht" required>
        <option value="" disabled selected>Selecteer…</option>
        <option value="Man">Man</option>
        <option value="Vrouw">Vrouw</option>
        <option value="Anders">Anders / geen voorkeur</option>
      </select>
    </div>
    <div class="form-group">
      <label for="geboortedatum">Geboortedatum</label>
      <input type="date" id="geboortedatum" name="geboortedatum" required>
    </div>
  </div>

  <div class="form-group">
    <label for="nationaliteit">Nationaliteit</label>
    <input type="text" id="nationaliteit" name="nationaliteit" placeholder="Nederlands" required>
  </div>

  <!-- Adres -->
  <p class="section-heading">Adres</p>

  <div class="form-group">
    <label for="straat">Straatnaam + huisnummer</label>
    <input type="text" id="straat" name="straat" placeholder="Hoofdstraat 12" required>
  </div>

  <div class="form-row">
    <div class="form-group">
      <label for="postcode">Postcode</label>
      <input type="text" id="postcode" name="postcode" placeholder="5681 AB" required>
    </div>
    <div class="form-group">
      <label for="woonplaats">Woonplaats</label>
      <input type="text" id="woonplaats" name="woonplaats" placeholder="Best" required>
    </div>
  </div>

  <!-- Contactgegevens -->
  <p class="section-heading">Contactgegevens</p>

  <div class="form-row">
    <div class="form-group">
      <label for="telefoon">Telefoonnummer</label>
      <input type="tel" id="telefoon" name="telefoon" placeholder="+31 6 12345678" required>
    </div>
    <div class="form-group">
      <label for="email">E-mailadres</label>
      <input type="email" id="email" name="email" placeholder="jan@voorbeeld.nl" required>
    </div>
  </div>

  <!-- Duikervaring -->
  <p class="section-heading">Duikervaring</p>

  <div class="form-group">
    <label for="andere-nob">Bent u lid van een andere NOB-vereniging?</label>
    <input type="text" id="andere-nob" name="andere_nob_vereniging" placeholder="Naam van de vereniging (laat leeg indien niet van toepassing)">
  </div>

  <div class="form-group">
    <label for="nob-brevet">Hoogst behaalde NOB-brevet</label>
    <input type="text" id="nob-brevet" name="nob_brevet" placeholder="bijv. 2-ster NOB">
  </div>

  <div class="form-group">
    <label for="andere-brevetten">Andere brevetten</label>
    <input type="text" id="andere-brevetten" name="andere_brevetten" placeholder="bijv. PADI Open Water, EFR">
  </div>

  <!-- Privacy -->
  <div class="checkbox-group">
    <input type="checkbox" id="akkoord" name="akkoord" value="Ja" required>
    <label for="akkoord">
      Ik ga akkoord met de opslag en verwerking van deze gegevens door Duikteam Best.
    </label>
  </div>

  <div class="h-captcha" data-captcha="true"></div>

  <button type="submit">Aanmelding versturen</button>
  <div class="success-message" id="success-message">
    Bedankt voor je aanmelding! We nemen zo snel mogelijk contact met je op.
  </div>
</form>

<script>
  document.getElementById('membership-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const form = e.target;
    const data = new FormData(form);
    const res = await fetch(form.action, { method: 'POST', body: data, headers: { 'Accept': 'application/json' } });
    if (res.ok) {
      form.reset();
      document.getElementById('success-message').style.display = 'block';
    }
  });
</script>
