name: Deploy Jekyll site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@4a9ddd6f338a97768b8006bf671dfbad383215f4
        with:
          ruby-version: '3.1'
          bundler-cache: true
          cache-version: 4

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '22' # matches Sanity requirements

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Install Node dependencies
        run: npm install node-fetch

      - name: Fetch Sanity content with galleries
        env:
          SANITY_PROJECT_ID: ${{ secrets.SANITY_PROJECT_ID }}
          SANITY_DATASET: ${{ secrets.SANITY_DATASET }}
          SANITY_TOKEN: ${{ secrets.SANITY_TOKEN }}
        run: |
          node <<'EOF'
          const fetch = require('node-fetch');
          const fs = require('fs');

          const projectId = process.env.SANITY_PROJECT_ID;
          const dataset = process.env.SANITY_DATASET;
          const token = process.env.SANITY_TOKEN;

          // Utility to get image URL with optional size parameters
          function getImageUrl(image) {
            if (!image || !image.asset || !image.asset._ref) return null;
            const ref = image.asset._ref;
            // Sanity asset ref format: image-<id>-<width>x<height>-<format>
            const parts = ref.split('-');
            const id = parts[1];
            const dims = parts[2];
            const format = parts[3];
            return `https://cdn.sanity.io/images/${projectId}/${dataset}/${id}-${dims}.${format}`;
          }

          async function fetchType(type) {
            const query = `*[_type=="${type}"]`;
            const url = `https://${projectId}.api.sanity.io/v2023-01-01/data/query/${dataset}?query=${encodeURIComponent(query)}`;
            const res = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
            const json = await res.json();
            return json.result.map(item => {
              if (type === 'dive' && item.photos) {
                item.photos = item.photos.map(p => ({
                  url: getImageUrl(p),
                  caption: p.caption || "",
                  alt: p.alt || ""
                }));
              }
              if (type === 'page' && item.mainImage) {
                item.mainImage = {
                  url: getImageUrl(item.mainImage),
                  alt: item.mainImage.alt || "",
                  caption: item.mainImage.caption || ""
                };
              }
              return item;
            });
          }

          async function main() {
            const pages = await fetchType('page');
            const dives = await fetchType('dive');

            fs.writeFileSync('_data/pages.json', JSON.stringify(pages, null, 2));
            fs.writeFileSync('_data/dives.json', JSON.stringify(dives, null, 2));
          }

          main();
          EOF

      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production
          PAGES_REPO_NWO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4